version: '3.8'

# NVIDIA GPU Support for Ollama:
# Prerequisites:
#   1. Install NVIDIA Docker runtime: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#   2. On Windows with WSL2: Install NVIDIA drivers for WSL2
#   3. Verify with: docker run --rm --gpus all nvidia/cuda:11.8.0-base-ubuntu22.04 nvidia-smi
# The ollama service is configured to use all available NVIDIA GPUs for faster inference.

services:
  # Redis service for caching
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rag_network

  # Ollama service for local LLM with llama3.1:8b and gemma:300m
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q 'llama3.1:8b' && ollama list | grep -q 'embeddinggemma:300m'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 10 &&
       ollama pull llama3.1:8b &&
       ollama pull embeddinggemma:300m &&
       tail -f /dev/null"

  # ROS2 RAG Service
  rag_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_service_node
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # OLLAMA CONFIGURATION - llama3.1:8b (LLM) + gemma:300m (embeddings)
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3.1:8b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-embeddinggemma:300m}
      - REDIS_URL=redis://redis:6379
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      # Mount the package sources for development (optional)
      - ./rag_interfaces:/ros2_ws/src/rag_interfaces
      - ./rag_service:/ros2_ws/src/rag_service
      # Persist vector databases
      - vector_dbs:/ros2_ws/src/rag_service/data/vector_dbs
    networks:
      - rag_network
    stdin_open: true
    tty: true
    command: ros2 launch rag_service rag_service_launch.py

  # Optional: Example client for testing
  rag_client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_client
    depends_on:
      - rag_service
    environment:
      - ROS_DOMAIN_ID=0
    networks:
      - rag_network
    stdin_open: true
    tty: true
    command: ros2 run rag_service rag_client_example
    profiles:
      - client  # Only start with: docker-compose --profile client up

volumes:
  redis_data:
    driver: local
  vector_dbs:
    driver: local
  ollama_data:
    driver: local

networks:
  rag_network:
    driver: bridge
